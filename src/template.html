<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="start-screen screen active-screen">
            <h1>CONNECT 4</h1>
            <div class="start-buttons">
                <button class="1p-button">Singleplayer</button>
                <button class="2p-button">Two Player</button>
            </div>
        </div>
        <div class="game-container screen">
            <div class="board-back">
                <div class="piece-container" id="piece-container">
                </div>
            </div>
            <div class="board"></div>
        </div>
    </main>
</body>
</html>
