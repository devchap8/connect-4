<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="screen active-screen" id="start-screen">
        <h1>CONNECT 4</h1>
        <div class="start-buttons">
            <button class="singleplayer-button">Singleplayer</button>
            <button class="twoplayer-button">Two Player</button>
        </div>
    </div>
    <div class="screen game-container" id="game-screen">
        <div class="board-back">
            <div class="piece-container" id="piece-container">
            </div>
        </div>
        <div class="board"></div>
    </div>
</body>
</html>
